repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=512"]
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.13
    hooks:
      # NOTE: `--exit-non-zero-on-fix` was REMOVED on 2026-05-21 after
      # diagnosing a class of silent-commit-rollback bugs:
      #   - When you `git commit` with both staged AND unstaged
      #     changes, pre-commit stashes the unstaged set, runs the
      #     hooks, ruff auto-fixes something, then exits 1 because
      #     of `--exit-non-zero-on-fix`. Pre-commit reports
      #     "Stashed changes conflicted with hook auto-fixes…
      #     Rolling back fixes" — which makes it look like the
      #     fixes were undone but the COMMIT proceeded. In reality
      #     the commit ALSO got cancelled, HEAD didn't advance,
      #     and the only signal was the cryptic "rollback" line.
      #   - Without the flag, ruff still auto-fixes (--fix), but
      #     exits 0 on success. The fixes land cleanly, the commit
      #     proceeds, and the developer sees the auto-fixes IN the
      #     commit. pyright runs after so semantic regressions are
      #     still caught.
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  - repo: local
    hooks:
      - id: pyright
        name: pyright (strict)
        entry: uv run pyright
        language: system
        pass_filenames: false
        types: [python]

      # Biome runs INSIDE pre-commit (not as a separate manual step)
      # so its auto-fixes go through pre-commit's "fail + restage"
      # flow rather than landing in the working tree AFTER the
      # commit already snapshotted the index. Without this hook,
      # frontend reformatting silently dropped staged-but-modified
      # files from the resulting commit.
      - id: biome
        name: biome (web)
        entry: bash -c 'cd apps/web && pnpm exec biome check --write --no-errors-on-unmatched src'
        language: system
        pass_filenames: false
        files: ^apps/web/src/.*\.(ts|tsx|js|jsx|json)$
