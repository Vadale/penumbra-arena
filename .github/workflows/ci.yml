name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Python — pytest + pyright + ruff
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.11.16"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      # Pin Python 3.13: tenseal 0.3.x only ships cp312/cp313 wheels.
      # `.python-version` is project-gitignored to keep local dev autonomy,
      # so the pin lives here.
      - name: Install Python 3.13
        run: uv python install 3.13

      - name: Sync workspace
        run: uv sync --all-packages --python 3.13

      - name: Ruff check
        run: uv run ruff check packages

      - name: Pyright (strict)
        run: uv run pyright packages

      - name: Pytest (excludes -k "slow")
        env:
          PENUMBRA_SEED: "42"
        run: uv run pytest packages -k "not slow" -q

  frontend:
    name: TS — typecheck + biome + vitest + build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        run: corepack enable && corepack prepare pnpm@latest --activate

      - name: Install deps
        working-directory: apps/web
        run: pnpm install --frozen-lockfile=false

      - name: Typecheck
        working-directory: apps/web
        run: pnpm typecheck

      - name: Biome check
        working-directory: apps/web
        run: pnpm exec biome check src

      - name: Vitest
        working-directory: apps/web
        run: pnpm test

      - name: Build
        working-directory: apps/web
        run: pnpm build
