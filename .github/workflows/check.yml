name: check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: backend (python)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.11.15"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: install python
        run: uv python install 3.12

      - name: sync deps
        # NOTE: torch + numpyro + jax are heavy; expect the first run on a
        # cold cache to take ~5 min. Subsequent runs reuse the cache hash.
        run: uv sync --all-packages

      - name: lint
        run: uv run ruff check packages

      - name: typecheck
        run: uv run pyright packages

      - name: test
        run: uv run pytest -q packages

  frontend:
    name: frontend (web)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: install node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "11.1.3"
          run_install: false

      - name: pnpm store cache
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: install
        run: pnpm install --frozen-lockfile

      - name: typecheck
        run: pnpm --filter web typecheck

      - name: lint
        run: pnpm --filter web lint

      - name: build
        run: pnpm --filter web build

      - name: test
        run: pnpm --filter web test
