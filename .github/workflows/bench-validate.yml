name: bench-validate

# Validates new / modified Penumbra-Bench submission JSONs on PRs.
# The validator is dependency-free (stdlib only) so we skip the heavy
# `uv sync --all-packages` step — this keeps the job under 30 seconds.

on:
  pull_request:
    paths:
      - "state/bench/submissions/**.json"
      - "scripts/validate_submission.py"
      - "state/bench/SCHEMA.json"
      - ".github/workflows/bench-validate.yml"

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    name: validate submissions
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: checkout PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: list changed submission files
        id: changed
        run: |
          git fetch origin "${{ github.base_ref }}" --depth=1
          BASE_SHA=$(git rev-parse "origin/${{ github.base_ref }}")
          FILES=$(git diff --name-only --diff-filter=AM "$BASE_SHA"...HEAD -- 'state/bench/submissions/*.json' || true)
          {
            echo "files<<EOF"
            echo "$FILES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          if [ -z "$FILES" ]; then
            echo "no submission files changed; nothing to validate."
          else
            echo "changed submission files:"
            echo "$FILES"
          fi

      - name: run validator
        id: validate
        if: steps.changed.outputs.files != ''
        run: |
          set +e
          REPORT=$(mktemp)
          STATUS=0
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            echo "--- validating $f ---" | tee -a "$REPORT"
            python scripts/validate_submission.py "$f" 2>&1 | tee -a "$REPORT"
            RC=${PIPESTATUS[0]}
            if [ "$RC" -ne 0 ]; then
              STATUS=1
            fi
          done <<< "${{ steps.changed.outputs.files }}"
          {
            echo "status=$STATUS"
            echo "report<<EOF"
            cat "$REPORT"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          exit "$STATUS"
        continue-on-error: true

      - name: comment on PR
        if: steps.changed.outputs.files != '' && github.event.pull_request.number != ''
        uses: actions/github-script@v7
        with:
          script: |
            const status = "${{ steps.validate.outputs.status }}";
            const report = `${{ steps.validate.outputs.report }}`;
            const emoji = status === "0" ? "PASS" : "FAIL";
            const body = [
              `### Penumbra-Bench submission validation: **${emoji}**`,
              "",
              "<details><summary>Validator output</summary>",
              "",
              "```",
              report || "(empty)",
              "```",
              "</details>",
            ].join("\n");
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: fail job if validation failed
        if: steps.changed.outputs.files != '' && steps.validate.outputs.status != '0'
        run: |
          echo "::error::one or more submissions failed validation"
          exit 1
