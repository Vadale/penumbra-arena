[project]
name = "penumbra-chain"
version = "0.1.0"
description = "Penumbra local blockchain: blocks, Merkle, PoS-VRF, BLS finality, explorer API."
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
  "polars>=1.16",
  "penumbra-core",
  "penumbra-crypto",
]

[tool.uv.sources]
penumbra-core = { workspace = true }
penumbra-crypto = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["penumbra_chain"]
