[project]
name = "penumbra-crypto"
version = "0.1.0"
description = "Penumbra cryptography: CKKS, TFHE, DP, PQ, BLS, VRF, VDF, Groth16, educational SMPC."
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
  "numpy>=2.0",
  # OpenFHE-Python ships only Linux x86_64 wheels as of 1.5.1; on Apple
  # Silicon we use TenSEAL (precompiled arm64 wheel) behind the same
  # HEBackend adapter interface. PENUMBRA_HE_BACKEND selects at startup;
  # default is auto-detect.
  "tenseal>=0.3.16",
  "diffprivlib>=0.6",
  "pqcrypto>=0.4",
  "py_ecc>=8.0",
  "penumbra-core",
]

[tool.uv.sources]
penumbra-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["penumbra_crypto"]
