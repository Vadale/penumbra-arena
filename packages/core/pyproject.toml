[project]
name = "penumbra-core"
version = "0.1.0"
description = "Penumbra domain core: arena, agent, match, simulation tick, central RNG."
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
  "numpy>=2.0",
  "networkx>=3.4",
  "msgpack>=1.1",
  "ortools>=9.10",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["penumbra_core"]
