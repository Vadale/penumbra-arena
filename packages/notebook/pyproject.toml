[project]
name = "penumbra-notebook"
version = "0.1.0"
description = "Jupyter / IPython bridge for Penumbra: `%penumbra` magics + sandboxed `%%penumbra attack` cells."
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
  "httpx>=0.28",
  "penumbra-attacker",
]

[project.optional-dependencies]
ipython = ["ipython>=8"]

[tool.uv.sources]
penumbra-attacker = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["penumbra_notebook"]
