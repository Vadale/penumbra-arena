[project]
name = "penumbra-operator"
version = "0.1.0"
description = "Penumbra Operator Mode: tabletop-drill console + `pno` CLI driving an external operator agent."
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
  "typer>=0.13",
  "pyyaml>=6.0",
  "polars>=1.16",
  "penumbra-core",
  "penumbra-transport",
]

[project.scripts]
pno = "penumbra_operator.cli:app"

[tool.uv.sources]
penumbra-core = { workspace = true }
penumbra-transport = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["penumbra_operator"]
