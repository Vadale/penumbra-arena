id: scn-005-linkability-attacker
title: "Link two pseudonyms via 1-NN behavioural matching"
difficulty: medium
description: |
  Collect feature vectors (position, trade pattern, lead times) on
  two pseudonymous identities. Use the 1-NN matcher to test whether
  they are the same underlying agent. Victory = accuracy ≥ 0.8 on a
  paired holdout of length 100.
setup:
  seed: 211
  n_agents: 50
  preconditions:
    - "target.pseudonyms: [a,b]"
opening_event:
  kind: "operator.scenario.attack.linkability"
  payload:
    feature_set: ["position", "trade_pattern", "lead_time"]
    n_samples: 100
victory:
  - "custom.matcher_accuracy >= 0.8"
  - "operator.privacy_preserved > 0.4"
failure:
  - "custom.matcher_accuracy < 0.2"
  - "elapsed_ticks > 3000"
allowed_actions:
  - "query_dp"
  - "sign"
  - "verify"
scoring:
  weights:
    attacks_survived: 0.5
    privacy_preserved: 0.2
    profit: 0.2
    chain_contribution: 0.1
