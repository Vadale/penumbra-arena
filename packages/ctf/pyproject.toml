[project]
name = "penumbra-ctf"
version = "0.1.0"
description = "Penumbra Capture-the-Flag: privacy + crypto challenges with per-challenge leaderboards."
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
  "pyyaml>=6.0",
  "penumbra-core",
]

[tool.uv.sources]
penumbra-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["penumbra_ctf"]

[tool.hatch.build.targets.wheel.force-include]
"challenges" = "penumbra_ctf/challenges"
