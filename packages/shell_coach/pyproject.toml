[project]
name = "penumbra-shell-coach"
version = "0.1.0"
description = "Penumbra shell tutor: curated macOS/Unix lessons + command explainer + error helper."
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
  "typer>=0.13",
  "pyyaml>=6.0",
  "rich>=13.0",
]

[project.scripts]
psh = "penumbra_shell_coach.cli:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["penumbra_shell_coach"]

[tool.hatch.build.targets.wheel.force-include]
"penumbra_shell_coach/lessons" = "penumbra_shell_coach/lessons"
