[project]
name = "penumbra-transport"
version = "0.1.0"
description = "Penumbra HTTP + WebSocket transport: FastAPI app, tick streaming, lifecycle controls."
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
  "fastapi>=0.115",
  "uvicorn[standard]>=0.32",
  "msgpack>=1.1",
  "penumbra-core",
]

[tool.uv.sources]
penumbra-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["penumbra_transport"]
