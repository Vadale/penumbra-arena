[project]
name = "penumbra-transport"
version = "0.1.0"
description = "Penumbra HTTP + WebSocket transport: FastAPI app, tick streaming, lifecycle controls."
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
  "fastapi>=0.115",
  "uvicorn[standard]>=0.32",
  "msgpack>=1.1",
  "numpy>=2.0",
  "penumbra-core",
  "penumbra-chain",
  "penumbra-crypto",
  "penumbra-analytics",
  "penumbra-attacker",
  "penumbra-ctf",
]

[tool.uv.sources]
penumbra-core = { workspace = true }
penumbra-chain = { workspace = true }
penumbra-crypto = { workspace = true }
penumbra-analytics = { workspace = true }
penumbra-attacker = { workspace = true }
penumbra-ctf = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["penumbra_transport"]
