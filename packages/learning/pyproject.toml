[project]
name = "penumbra-learning"
version = "0.1.0"
description = "Penumbra learning stack: MAPPO multi-agent RL + GATv2 pathfinder on MPS."
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
  "numpy>=2.0",
  "torch>=2.5",
  "pettingzoo>=1.24",
  "penumbra-core",
]

[tool.uv.sources]
penumbra-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["penumbra_learning"]
