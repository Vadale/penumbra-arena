[project]
name = "penumbra-analytics"
version = "0.1.0"
description = "Penumbra analytics: descriptive + inferential stats, econometrics, Monte Carlo, linalg/topology."
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
  "numpy>=2.0",
  "polars>=1.16",
  "scipy>=1.14",
  "statsmodels>=0.14",
  "scikit-learn>=1.5",
  "networkx>=3.4",
  "penumbra-core",
]

[tool.uv.sources]
penumbra-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["penumbra_analytics"]
