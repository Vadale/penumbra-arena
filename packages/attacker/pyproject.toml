[project]
name = "penumbra-attacker"
version = "0.1.0"
description = "Penumbra adversarial console: replay, linkability, DP reconstruction, byzantine, side-channel demos."
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
  "numpy>=2.0",
  "scipy>=1.13",
  "torch>=2.4",
  "typer>=0.13",
  "penumbra-core",
  "penumbra-crypto",
  "penumbra-chain",
]

[project.scripts]
pna = "penumbra_attacker.cli:app"

[tool.uv.sources]
penumbra-core = { workspace = true }
penumbra-crypto = { workspace = true }
penumbra-chain = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["penumbra_attacker"]
