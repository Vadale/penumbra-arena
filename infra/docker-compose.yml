services:
  api:
    build:
      context: ..
      dockerfile: infra/Dockerfile.api
    environment:
      PENUMBRA_SEED: "${PENUMBRA_SEED:-20260520}"
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    build:
      context: ..
      dockerfile: infra/Dockerfile.web
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "5173:5173"

networks:
  default:
    name: penumbra
