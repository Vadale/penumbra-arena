server {
    listen 5173;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — any unknown route returns index.html so React Router
    # (or future client-side routing) can pick it up.
    location / {
        try_files $uri /index.html;
    }

    # Proxy backend traffic to the api service inside the compose network.
    location /health             { proxy_pass http://api:8000; }
    location /state              { proxy_pass http://api:8000; }
    location /control            { proxy_pass http://api:8000; }
    location /chain              { proxy_pass http://api:8000; }
    location /dashboard          { proxy_pass http://api:8000; }
    location /encrypted-heatmap  { proxy_pass http://api:8000; }
    location /coach              { proxy_pass http://api:8000; }

    location /ws {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }
}
